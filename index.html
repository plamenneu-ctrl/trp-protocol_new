<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>TRP Lab - Протокол</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🧠 TRP Lab</h1>
    <p class="subtitle">Актуализиране на емоционалния опит</p>

    <div id="step1">
      <h3>Етап 1: Подготовка (Идентификация)</h3>
      <textarea id="symptom" placeholder="Какъв е симптомът? (напр. паника)"></textarea>
      <textarea id="truth" placeholder="Емоционална истина (вярването на амигдалата)"></textarea>
      <button onclick="goToStep2()">Към Реактивация</button>
    </div>

    <div id="step2" class="hidden">
      <h3>Етап 2: Реактивация</h3>
      <p>Задръжте емоцията за 10-60 секунди, за да дестабилизирате спомена.</p>
      <div id="timerDisplay" style="font-size: 2rem; text-align: center; margin: 10px;">45</div>
      <button id="timerBtn" onclick="startTimer()">Започни таймер</button>
    </div>

    <div id="step3" class="hidden">
      <h3>Етап 3: Несъответствие (Mismatch)</h3>
      <div id="oldTruthDisplay" style="background: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 10px;"></div>
      <textarea id="newExperience" placeholder="Въведете новия опит (Контраст)"></textarea>
      <button onclick="saveSession()">Завърши и Интегрирай</button>
    </div>

    <h2>Записани сесии</h2>
    <div id="list"></div>
  </div>
<script src="app.js"></script>
</body>
</html>
